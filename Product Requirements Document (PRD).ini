10. Data Models
Story Model
class Story {
  final int id;
  final String title;
  final String by;
  final int score;
  final int descendants;
  final int time;
  final String? url;
  final List<int>? kids;
}
Comment Model
class Comment {
  final int id;
  final String by;
  final String text;
  final int time;
  final List<int>? kids;
}
11. UI Requirements
Home Screen UI
Simple clean list layout
Card/ListTile-based design
Loading indicator while fetching
Detail Screen UI
Story header at top
Divider between story and comments
Expandable nested comments (optional)

Reference layouts are shown in the assignment PDF.

12. Error Handling

The app should handle:

No internet connection
API timeout
Empty responses
Invalid JSON
Missing comments

Suggested UI:

Snackbar
Retry button
Empty state widget
13. Performance Considerations
Fetch story details lazily
Use pagination or batching
Cache already fetched stories/comments
Avoid unnecessary rebuilds
