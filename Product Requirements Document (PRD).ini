Product Requirements Document (PRD)
Hacker News Reader App (Flutter)
Project Overview

Build a simple Hacker News Reader mobile application using Flutter that fetches and displays top stories from the Hacker News API. The app should support viewing story details and comments, with optional support for nested comments. The application must run on Android and may optionally support iOS.

1. Objective

The goal of this project is to create a lightweight, functional Hacker News client using Flutter that demonstrates:

REST API integration
Asynchronous data fetching
State management
List rendering
Navigation between screens
Comment parsing and display

The app prioritizes functionality and clean architecture over advanced UI polish.

2. Target Platform
Platform	Requirement
Android	Mandatory
iOS	Optional
3. Tech Stack
Layer	Technology
Framework	Flutter
Language	Dart
API Source	Hacker News Firebase API
HTTP Client	http / dio
State Management	Provider / Riverpod / Bloc
Local Cache (Optional)	Hive / SharedPreferences
4. APIs
4.1 Top Stories API

Returns a list of story IDs.

https://hacker-news.firebaseio.com/v0/topstories.json
4.2 Item Detail API

Returns story/comment details.

https://hacker-news.firebaseio.com/v0/item/<id>.json

Example:

https://hacker-news.firebaseio.com/v0/item/2921983.json

5. Core Features
5.1 Home Screen
Description

Displays the top Hacker News stories in a scrollable list.

Functional Requirements
Fetch Stories
Call topstories.json
Retrieve list of story IDs
Fetch individual story details using item API
Display Story Information

Each story card/list item should display:

Story title
Author name
Score/points
Number of comments
Publication time
Domain/URL (optional)
User Actions
Tap on a story to open detail screen
Pull-to-refresh support
Infinite loading/pagination (optional)
5.2 Detail Screen
Description

Displays selected story details and comments.

Functional Requirements
Show Story Information

Display:

Story title
URL
Author
Timestamp
Score
Fetch Comments
Use kids array from story payload
Fetch comment details recursively
Comment Display

Support:

First-level comments (mandatory)
Nested comments (bonus)
Comment Content

Each comment should show:

Username
Time posted
Comment text (HTML rendered if needed)
6. User Flow
App Launch
Open app
Fetch top stories
Render list
Story Selection
User taps story
Navigate to detail screen
Fetch story details/comments
Render comments
