App Flow — Hacker News Reader App
1. App Launch Flow
User Opens App        ↓Initialize Flutter App        ↓Show Splash/Loading State        ↓Call Top Stories API(topstories.json)        ↓Receive List of Story IDs        ↓Fetch Story Details Using item/<id>.json        ↓Render Home Screen with Stories

2. Home Screen Flow
Home Screen Loaded        ↓Display List of Top Stories        ↓Each Story Card Shows:- Title- Author- Score- Comment Count- Time        ↓User Scrolls Through Stories        ↓(Optional)Pull To Refresh        ↓Reload Top Stories

3. Story Selection Flow
User Taps Story        ↓Navigate To Detail Screen        ↓Pass Selected Story ID        ↓Show Loading Indicator        ↓Fetch Story Detail Using:item/<story_id>.json        ↓Fetch Comments Using kids Array        ↓Render Story + Comments

4. Comment Fetching Flow
Get kids Array From Story        ↓Loop Through Comment IDs        ↓Fetch Each Comment Using:item/<comment_id>.json        ↓Parse Comment Data        ↓Display First-Level Comments        ↓(Optional)If Comment Has kids:Recursively Fetch Nested Comments

5. Nested Comment Flow (Bonus)
Parent Comment        ↓Check kids Array        ↓Fetch Child Comments        ↓Indent Nested Replies        ↓Render Recursive Comment Tree

6. Error Handling Flow
API Request Starts        ↓Success? ─── Yes ─→ Render Data   ↓   No   ↓Show Error Message   ↓Display Retry Button   ↓User Retries Request

7. Refresh Flow
User Pulls To Refresh        ↓Clear Existing Story Cache        ↓Call Top Stories API Again        ↓Fetch Updated Stories        ↓Update UI

8. Complete User Journey
Launch App   ↓View Top Stories   ↓Select Story   ↓Read Story Details   ↓View Comments   ↓Expand Nested Replies (Optional)   ↓Return To Home Screen   ↓Browse More Stories

Recommended Navigation Structure
main.dart   ↓HomeScreen   ↓DetailScreen

Suggested State Flow
API Service     ↓Repository Layer     ↓Provider / Bloc / Riverpod     ↓UI Screens

API Interaction Flow
topstories.json        ↓Returns Story IDs        ↓item/<id>.json        ↓Returns Story Details        ↓kids Array        ↓item/<comment_id>.json        ↓Returns Comment Details

Loading States Flow
App Starts   ↓Show Circular Loader   ↓Fetch Data   ↓Data Loaded?   ↓         ↓ Yes         No ↓            ↓Render UI   Show Error State

Optional Enhanced Flow
Open App   ↓Load Cached Stories   ↓Fetch Latest Stories In Background   ↓Update UI Smoothly
